{% extends 'base.html' %}

{% block content %}
<div class="container">
    <a href="{% url 'coach_logout' %}" class="btn" style="position:absolute; top:20px; right:20px; padding:10px 20px;">Logout</a>

    <h1>Welcome, {{ coach.name }}!</h1>
    <h2>Choose Your Batch</h2>

    <div class="card-grid">
        {% for loc in locations %}
        <a href="{% url 'attendance' loc.id %}" class="card">
            <h3>{{ loc.name }}</h3>
            <p>{{ loc.time_slot }}</p>
            <p style="color:#718096;">{{ loc.students.count }} students</p>
        </a>
        {% empty %}
        <div class="card">
            <h3>No batches yet</h3>
            <a href="{% url 'add_location' coach.id %}" class="btn">Add First Batch</a>
        </div>
        {% endfor %}
        <a href="{% url 'add_location' coach.id %}" class="card" style="border:2px dashed #4299e1; background:#f0f9ff;">
            <h3>+ Add New Batch</h3>
        </a>
    </div>
</div>
{% endblock %}
