{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} Coach Portal{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>

   <!-- PREMIUM HEADER — LOGO LINKS TO BATCHES PAGE -->
{% if user.is_authenticated %}
<header class="main-header">
    <div class="container header-content">
        <a href="{% url 'select_location' user.coach.id %}" class="logo-link">
            <h2> Coach Portal</h2>
        </a>

        <div class="header-right">
            <span class="welcome-text">Hello, {{ user.coach.name }}!</span>
            <a href="{% url 'coach_logout' %}" class="logout-btn">Logout</a>
        </div>
    </div>
</header>
{% endif %}

    <!-- Main Content Area -->
    <main class="main-content">
        <div class="container">
            {% block content %}
            <!-- All page content goes here -->
            {% endblock %}
        </div>
    </main>

</body>
</html>
