{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Create Coach Account</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="container">
    <div style="max-width:500px; margin:100px auto; padding:50px; background:white; border-radius:20px; box-shadow:0 10px 40px rgba(0,0,0,0.1); text-align:center;">
        <h1 style="color:#4299e1;">Create Coach Account</h1>

        {% if error %}
            <div style="background:#fee; color:#c53030; padding:16px; border-radius:12px; margin:20px 0;">{{ error }}</div>
        {% endif %}
        {% if messages %}
            {% for msg in messages %}
                <div style="background:#d4edda; color:#155724; padding:16px; border-radius:12px; margin:20px 0;">{{ msg }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="text" name="name" placeholder="Full Name (e.g. Coach Rahul)" required style="width:100%;padding:18px;margin:12px 0;border:1px solid #e2e8f0;border-radius:14px;">
            <input type="text" name="username" placeholder="Username" required style="width:100%;padding:18px;margin:12px 0;border:1px solid #e2e8f0;border-radius:14px;">
            <input type="password" name="password" placeholder="Password" required style="width:100%;padding:18px;margin:12px 0;border:1px solid #e2e8f0;border-radius:14px;">
            <button type="submit" class="btn" style="width:100%;padding:18px;margin-top:20px;">Create Account</button>
        </form>

        <p style="margin-top:30px;">
            <a href="{% url 'coach_login' %}">Already have an account? Login</a>
        </p>
    </div>
</div>
</body>
</html>
