{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Free Account • Basketball Coach Portal</title>
    <link rel="stylesheet" href="{% static 'css/register.css' %}">
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <h1>Create Free Account</h1>
            <p class="subtitle">Start managing your academy in seconds</p>

            {% if messages %}
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <input type="text" name="name" placeholder="Full Name (e.g. Coach Rahul)" required>
                <input type="text" name="username" placeholder="Choose Username" required>
                <input type="password" name="password" placeholder="Create Password" required>
                
                <button type="submit" class="btn-register">Create Account</button>
            </form>

            <p class="login-link">
                Already have an account? <a href="{% url 'coach_login' %}">Login here</a>
            </p>
        </div>
    </div>
</body>
</html>
