{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Coach Portal - Login</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="container">
    <div style="max-width:460px; margin:120px auto; padding:60px 50px; background:white; border-radius:24px; box-shadow:0 15px 50px rgba(0,0,0,0.12); text-align:center;">
        
        <h1 style="color:#4299e1; font-size:2.8rem; margin-bottom:8px;">Coach Portal</h1>
        <p style="color:#718096; font-size:1.2rem; margin-bottom:40px;">Basketball Coaching Management</p>

       <!-- SUCCESS & ERROR MESSAGES – CLEAN & NO WARNINGS -->
{% if messages %}
    {% for message in messages %}
        {% if message.tags == 'error' %}
            <div style="background:#fee; color:#c53030; padding:16px; border-radius:12px; margin:20px 0; font-weight:600; border:1px solid #feb2b2;">
                {{ message }}
            </div>
        {% else %}
            <div style="background:#d4edda; color:#155724; padding:16px; border-radius:12px; margin:20px 0; font-weight:600; border:1px solid #c3e6cb;">
                {{ message }}
            </div>
        {% endif %}
    {% endfor %}
{% endif %}

        <!-- Login Form -->
        <form method="post" action="{% url 'coach_login' %}">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required
                   style="width:100%; padding:18px; margin:12px 0; border:1px solid #e2e8f0; border-radius:14px; font-size:1.1rem;">
            <input type="password" name="password" placeholder="Password" required
                   style="width:100%; padding:18px; margin:12px 0; border:1px solid #e2e8f0; border-radius:14px; font-size:1.1rem;">
            <button type="submit" class="btn" style="width:100%; padding:18px; font-size:1.2rem; margin-top:20px;">
                Login
            </button>
        </form>

        <!-- Register Button -->
        <div style="margin-top:40px; padding-top:30px; border-top:1px solid #e2e8f0;">
            <p style="color:#718096; margin-bottom:15px;">New coach?</p>
            <a href="{% url 'register_coach' %}" class="btn"
               style="background:#48bb78; width:100%; padding:18px; font-size:1.2rem; box-shadow:0 8px 25px rgba(72,187,120,0.35);">
                Create Coach Account
            </a>
        </div>
    </div>
</div>

</body>
</html>
