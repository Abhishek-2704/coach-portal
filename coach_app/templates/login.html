{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="card">
        <h2>Login to Your Portal</h2>
        
        {% if messages %}
            {% for message in messages %}
                <div class="messages {{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn">Login</button>
        </form>

        <p style="text-align:center; margin-top:20px; color:#718096;">
            New coach? <a href="{% url 'register_coach' %}" style="color:#4299e1;">Create Account</a>
        </p>
    </div>
</div>
{% endblock %}
{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}
