{% extends 'base.html' %}

{% block content %}
<div class="container">
    <a href="javascript:history.back()" class="back-link">Back</a>

    <div class="card">
        <h2>{{ title }}</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">Save</button>
            <a href="javascript:history.back()" class="btn">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
