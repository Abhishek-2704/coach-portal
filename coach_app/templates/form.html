{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .form-container { max-width: 600px; margin: 60px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        .form-group { margin-bottom: 24px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #2d3748; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 1rem; }
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: #4299e1; }
        .btn-group { text-align: center; margin-top: 30px; }
    </style>
</head>
<body>
<div class="container">
    <a href="javascript:history.back()" class="back-link">Back</a>
    <div class="form-container">
        <h1 style="text-align:center; margin-bottom:30px;">{{ title }}</h1>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                {{ form.as_p }}
            </div>
            <div class="btn-group">
                <button type="submit" class="btn" style="padding:14px 50px; font-size:1.1rem;">
                    Save
                </button>
                <a href="javascript:history.back()" class="btn btn-warning">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
